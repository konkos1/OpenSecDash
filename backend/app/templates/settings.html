{% extends "base.html" %}

{% block title %}
    {{ t("app.name") }} · {{ t("settings.title") }}
{% endblock %}

{% block content %}

    <h2 class="text-2xl font-semibold mb-5">{{ t("settings.title") }}</h2>

    <form class="card grid grid-cols-1 md:grid-cols-2 gap-4" method="post" action="/settings" x-data="{ mqttEnabled: '{{ mqtt_enabled }}' }" data-unsaved-warning="{{ t('settings.unsaved_changes') }}">
        <label>{{ t("settings.domain") }} <button type="button" class="help" data-tooltip="{{ t('settings.help.domain') }}">?</button>
            <input class="input" type="text" name="domain" value="{{ domain }}" placeholder="mydomain.com">
        </label>

        <label>{{ t("settings.language") }} <button type="button" class="help" data-tooltip="{{ t('settings.help.language') }}">?</button>
            <select class="input" name="language">
                <option value="en" {% if language_setting == 'en' %}selected{% endif %}>English</option>
                <option value="de" {% if language_setting == 'de' %}selected{% endif %}>Deutsch</option>
            </select>
        </label>

        <label>{{ t("settings.retention_days") }} <button type="button" class="help" data-tooltip="{{ t('settings.help.retention_days') }}">?</button>
            <select class="input" name="retention_days">
                <option>7</option>
                <option {% if retention_days == '30' %}selected{% endif %}>30</option>
                <option>90</option>
                <option>180</option>
                <option>365</option>
                <option value="0">{{ t("settings.unlimited") }}</option>
            </select>
        </label>

        <label>{{ t("settings.live_default") }} <button type="button" class="help" data-tooltip="{{ t('settings.help.live_default') }}">?</button>
            <select class="input" name="live_default">
                <option value="true" {% if live_default == 'true' %}selected{% endif %}>{{ t("settings.live_on") }}</option>
                <option value="false" {% if live_default == 'false' %}selected{% endif %}>{{ t("settings.snapshot") }}</option>
            </select>
        </label>

        <label>{{ t("settings.theme") }} <button type="button" class="help" data-tooltip="{{ t('settings.help.theme') }}">?</button>
            <select class="input" name="theme">
                <option value="auto">{{ t("settings.theme_auto") }}</option>
                <option value="dark">{{ t("settings.theme_dark") }}</option>
                <option value="light">{{ t("settings.theme_light") }}</option>
            </select>
        </label>

        <label>{{ t("settings.timezone") }} <button type="button" class="help" data-tooltip="{{ t('settings.help.timezone') }}">?</button>
            <input class="input" name="timezone" value="{{ timezone }}" placeholder="auto / Europe/Berlin">
        </label>

        <label>{{ t("settings.asset_source_type") }} <button type="button" class="help" data-tooltip="{{ t('settings.help.asset_source_type') }}">?</button>
            <select class="input" name="asset_source_type">
                <option value="file" {% if asset_source_type == 'file' %}selected{% endif %}>{{ t("settings.asset_source_type_file") }}</option>
                <option value="url" {% if asset_source_type == 'url' %}selected{% endif %}>{{ t("settings.asset_source_type_url") }}</option>
            </select>
        </label>

        <label>{{ t("settings.asset_source") }} <button type="button" class="help" data-tooltip="{{ t('settings.help.asset_source') }}">?</button>
            <input class="input" type="text" name="asset_source" value="{{ asset_source }}">
        </label>

        <label>{{ t("settings.asset_github_api_token") }} <button type="button" class="help" data-tooltip="{{ t('settings.help.asset_github_api_token') }}">?</button>
            <input class="input" type="password" name="github_token" value="{{ github_token }}">
        </label>

        <label>{{ t("settings.action_simulation") }} <button type="button" class="help" data-tooltip="{{ t('settings.help.action_simulation') }}">?</button>
            <select class="input" name="action_dry_run">
                <option value="true" {% if action_dry_run == 'true' %}selected{% endif %}>{{ t("settings.dry_run") }}</option>
                <option value="false" {% if action_dry_run == 'false' %}selected{% endif %}>{{ t("settings.execute_via_plugin") }}</option>
            </select>
        </label>

        <label>{{ t("settings.mqtt_enabled") }} <button type="button" class="help" data-tooltip="{{ t('settings.help.mqtt_enabled') }}">?</button>
            <select class="input" name="mqtt_enabled" x-model="mqttEnabled">
                <option value="false" {% if mqtt_enabled == 'false' %}selected{% endif %}>{{ t("common.no") }}</option>
                <option value="true" {% if mqtt_enabled == 'true' %}selected{% endif %}>{{ t("common.yes") }}</option>
            </select>
        </label>

        <label x-show="mqttEnabled === 'true'" x-cloak>{{ t("settings.mqtt_host") }} <button type="button" class="help" data-tooltip="{{ t('settings.help.mqtt_host') }}">?</button>
            <input class="input" name="mqtt_host" value="{{ mqtt_host }}">
        </label>

        <label x-show="mqttEnabled === 'true'" x-cloak>{{ t("settings.mqtt_port") }} <button type="button" class="help" data-tooltip="{{ t('settings.help.mqtt_port') }}">?</button>
            <input class="input" name="mqtt_port" value="{{ mqtt_port }}">
        </label>

        <label x-show="mqttEnabled === 'true'" x-cloak>{{ t("settings.mqtt_username") }} <button type="button" class="help" data-tooltip="{{ t('settings.help.mqtt_username') }}">?</button>
            <input class="input" name="mqtt_username" value="{{ mqtt_username }}" autocomplete="username">
        </label>

        <label x-show="mqttEnabled === 'true'" x-cloak>{{ t("settings.mqtt_password") }} <button type="button" class="help" data-tooltip="{{ t('settings.help.mqtt_password') }}">?</button>
            <input class="input" type="password" name="mqtt_password" value="{{ mqtt_password }}" autocomplete="current-password">
        </label>

        <label x-show="mqttEnabled === 'true'" x-cloak>{{ t("settings.mqtt_topic_prefix") }} <button type="button" class="help" data-tooltip="{{ t('settings.help.mqtt_topic_prefix') }}">?</button>
            <input class="input" name="mqtt_topic_prefix" value="{{ mqtt_topic_prefix }}">
        </label>

        <div class="md:col-span-2">
            <button class="btn" type="submit">{{ t("common.save_button") }}</button>
        </div>
    </form>

{% endblock %}
