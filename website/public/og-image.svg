<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">OpenSecDash social preview</title>
  <desc id="desc">OpenSecDash, a security dashboard for homelabs, with the official logo and a dark dashboard-style preview.</desc>
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.52" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="softGlow" cx="30%" cy="0%" r="75%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="logoBg" x1="72" y1="48" x2="440" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.48" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="logoShield" x1="155" y1="108" x2="357" y2="404" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="logoAccent" x1="178" y1="162" x2="342" y2="352" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#pageBg)"/>
  <rect width="1200" height="630" fill="url(#softGlow)"/>

  <g opacity="0.14" fill="none" stroke="#94a3b8" stroke-width="1">
    <path d="M0 96H1200M0 192H1200M0 288H1200M0 384H1200M0 480H1200M0 576H1200"/>
    <path d="M96 0V630M192 0V630M288 0V630M384 0V630M480 0V630M576 0V630M672 0V630M768 0V630M864 0V630M960 0V630M1056 0V630"/>
  </g>

  <!-- Official OpenSecDash logo, scaled from website/public/favicon.svg -->
  <g transform="translate(72 78) scale(0.36)" filter="url(#shadow)">
    <rect width="512" height="512" rx="116" fill="url(#logoBg)"/>
    <path d="M76 354c80-34 124-34 204 0s124 34 156 10" fill="none" stroke="#7dd3fc" stroke-width="18" stroke-linecap="round" opacity="0.22"/>
    <path d="M70 156c64 28 116 24 178-10s122-38 194-6" fill="none" stroke="#bfdbfe" stroke-width="14" stroke-linecap="round" opacity="0.18"/>
    <g>
      <path d="M256 82 378 130v101c0 82-45 154-122 199-77-45-122-117-122-199V130L256 82Z" fill="url(#logoShield)"/>
      <path d="M256 116 344 151v78c0 61-31 116-88 153-57-37-88-92-88-153v-78l88-35Z" fill="#0f172a" opacity="0.94"/>
    </g>
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M202 244h108" stroke="#93c5fd" stroke-width="16" opacity="0.95"/>
      <path d="M202 294h72" stroke="#38bdf8" stroke-width="16" opacity="0.95"/>
      <path d="M202 194h44" stroke="#dbeafe" stroke-width="16" opacity="0.95"/>
      <path d="M278 190c20 10 32 28 32 50s-12 40-32 50" stroke="url(#logoAccent)" stroke-width="18"/>
      <path d="M312 168c30 18 48 45 48 78s-18 60-48 78" stroke="#7dd3fc" stroke-width="12" opacity="0.75"/>
    </g>
    <g fill="url(#logoAccent)">
      <circle cx="184" cy="194" r="15"/>
      <circle cx="184" cy="244" r="15"/>
      <circle cx="184" cy="294" r="15"/>
    </g>
    <circle cx="256" cy="244" r="33" fill="#38bdf8" opacity="0.16"/>
    <circle cx="256" cy="244" r="14" fill="#e0f2fe"/>
  </g>

  <text x="286" y="144" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="72" font-weight="800" letter-spacing="-2">OpenSecDash</text>
  <text x="289" y="203" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="600">Security dashboard for homelabs</text>
  <text x="290" y="260" fill="#94a3b8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25">Live events · Assets · CrowdSec · Proxmox · MQTT · GeoIP</text>

  <!-- Dark, app-like dashboard preview: neutral cards, not colorful widgets. -->
  <g transform="translate(76 342)" filter="url(#shadow)">
    <rect width="1048" height="206" rx="24" fill="#0f172a" stroke="#1e293b"/>
    <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
      <rect x="26" y="26" width="232" height="70" rx="16" fill="#111827" stroke="#334155"/>
      <text x="50" y="58" fill="#94a3b8" font-size="17" font-weight="700">Bans today</text>
      <text x="50" y="90" fill="#f8fafc" font-size="34" font-weight="800">18</text>

      <rect x="282" y="26" width="232" height="70" rx="16" fill="#111827" stroke="#334155"/>
      <text x="306" y="58" fill="#94a3b8" font-size="17" font-weight="700">Access today</text>
      <text x="306" y="90" fill="#f8fafc" font-size="34" font-weight="800">1,284</text>

      <rect x="538" y="26" width="232" height="70" rx="16" fill="#111827" stroke="#334155"/>
      <text x="562" y="58" fill="#94a3b8" font-size="17" font-weight="700">Assets</text>
      <text x="562" y="90" fill="#f8fafc" font-size="34" font-weight="800">42</text>

      <rect x="794" y="26" width="228" height="70" rx="16" fill="#111827" stroke="#334155"/>
      <text x="818" y="58" fill="#94a3b8" font-size="17" font-weight="700">Updates</text>
      <text x="818" y="90" fill="#f8fafc" font-size="34" font-weight="800">7</text>

      <rect x="26" y="122" width="996" height="54" rx="16" fill="#020617" stroke="#1e293b"/>
      <circle cx="56" cy="149" r="7" fill="#38bdf8"/>
      <text x="78" y="156" fill="#e2e8f0" font-size="20" font-weight="650">access.denied</text>
      <text x="230" y="156" fill="#94a3b8" font-size="20">203.0.113.42 · /wp-login.php · 403 · Traefik</text>
      <text x="825" y="156" fill="#cbd5e1" font-size="20" font-weight="700">IP Explorer</text>
    </g>
  </g>

  <text x="76" y="592" fill="#64748b" font-family="Inter, ui-sans-serif, system-ui" font-size="20">opensecdash.app</text>
</svg>
