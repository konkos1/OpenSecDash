# Configuration for GitHub's release-notes generator (used by the Release
# workflow via /releases/generate-notes). Categories are matched by PR labels
# in the order below - breaking changes always lead the notes.
changelog:
  exclude:
    authors:
      - dependabot
      - github-actions
  categories:
    - title: "⚠️ Breaking changes"
      labels:
        - breaking-change
    - title: "🚀 Features"
      labels:
        - feature
    - title: "✨ Enhancements"
      labels:
        - enhancement
    - title: "🐛 Fixes"
      labels:
        - bug
        - fix
    - title: "📚 Documentation"
      labels:
        - documentation
    - title: "🔧 Other changes"
      labels:
        - "*"
