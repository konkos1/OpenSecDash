name: Bug report
description: Report something that is broken
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please remove secrets, public IPs you do not want to share, tokens, and private hostnames from logs or screenshots.

        Tip: OpenSecDash can create a debug ZIP package on the Diagnostics page. The package already redacts known sensitive values such as passwords, tokens, API keys, access keys, bearer credentials, URL usernames, and sensitive URL query parameters. Please still review every file before attaching it to a public issue.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: "The Events page shows ..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Enable ...
        2. Open ...
        3. Click ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: OpenSecDash version
      placeholder: "main, v0.1.0, commit SHA, or Docker tag"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      options:
        - Docker Compose
        - Docker run
        - Local development
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, reverse proxy, enabled plugins, relevant settings.
      placeholder: "Docker Desktop on macOS, Chrome, Traefik reverse proxy, CrowdSec + Traefik Log enabled"

  - type: textarea
    id: debug-report
    attributes:
      label: OpenSecDash debug package
      description: Attach the sanitized ZIP package from Diagnostics → Download debug report, or paste relevant excerpts. Please review every file before publishing because hostnames, IPs, asset names, and log payloads may still be sensitive in your environment.
      render: text

  - type: textarea
    id: logs
    attributes:
      label: Additional logs or screenshots
      description: Paste other relevant sanitized logs or attach screenshots.
      render: text

  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I reviewed every file in the OpenSecDash debug package and removed any remaining sensitive hostnames, IPs, asset names, private log payloads, secrets, tokens, or private keys before attaching it.
          required: true
        - label: I searched existing issues before opening this one.
          required: true
