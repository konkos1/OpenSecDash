name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Build release notes
        id: notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # GitHub's own release-notes generator instead of walking every
          # commit through /commits/{sha}/pulls: that endpoint also returns
          # merely *associated* (even unmerged) pull requests and the old
          # per-commit loop silently dropped PRs on any API error - releases
          # ended up listing PRs twice or missing them. generate-notes is one
          # call, uses GitHub's merge-based logic, and only adds a "New
          # Contributors" section when someone actually contributed for the
          # first time (the contributor avatars under a release are rendered
          # by GitHub automatically either way).
          previous_tag="$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | grep -vx "${TAG}" | head -n1 || true)"
          args=(-f tag_name="${TAG}")
          if [[ -n "${previous_tag}" ]]; then
            args+=(-f previous_tag_name="${previous_tag}")
          fi
          gh api "/repos/${REPO}/releases/generate-notes" "${args[@]}" --jq '.body' > release-notes.md

          echo "Generated release notes for ${TAG} (previous tag: ${previous_tag:-none}):"
          cat release-notes.md

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" --title "${TAG}" --notes-file release-notes.md
          else
            gh release create "${TAG}" --title "${TAG}" --notes-file release-notes.md --verify-tag
          fi

  website:
    # The website follows releases: merges to main only deploy immediately
    # when the PR carries the `website-deploy` label (see website.yml). Every
    # release publishes the site so feature docs go live together with the
    # version they describe.
    name: Deploy website
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      # Shared with the Website workflow so two deploys never run wrangler
      # against Cloudflare at the same time.
      group: website-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci --no-audit

      - name: Build website
        working-directory: website
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: npm run docs:build

      - name: Deploy to Cloudflare Workers
        working-directory: website
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx --yes wrangler@latest deploy

      - name: Wait for Cloudflare deployment propagation
        run: sleep 60

      - name: Submit URLs to IndexNow
        continue-on-error: true
        working-directory: website
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          INDEXNOW_HOST: opensecdash.app
          INDEXNOW_ENDPOINT: https://api.indexnow.org/indexnow
        run: npm run indexnow:submit
