name: Tests

# No `paths:` filter on purpose: "Backend tests" is a required status check,
# and a workflow that never triggers leaves the check in "Expected" forever,
# blocking the merge. Instead the workflow always runs, a cheap first job
# detects whether anything test-relevant changed, and the heavy job is
# skipped otherwise - skipped jobs satisfy required checks.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Check for test-relevant changes
        id: filter
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" != "pull_request" && ( -z "${BASE_SHA}" || "${BASE_SHA}" == "0000000000000000000000000000000000000000" ) ]]; then
            echo "No usable base commit (new branch/force push) - running tests to be safe."
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            # Three-dot diff = changes on the PR side only, even when main moved on.
            changed="$(git diff --name-only "${BASE_SHA}...HEAD")"
          else
            changed="$(git diff --name-only "${BASE_SHA}..${GITHUB_SHA}")"
          fi
          echo "Changed files:"
          echo "${changed}"
          # Markdown-only changes (READMEs, docs) don't need the test suite;
          # anything else affecting the app or production image does.
          if echo "${changed}" | grep -vE '\.md$' | grep -qE '^(backend/|plugins/|docker/|\.github/workflows/)'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "Only documentation/unrelated files changed - skipping tests."
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    if: needs.changes.outputs.code == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Verify development and production runtime parity
        run: python3 docker/verify-runtime-parity.py

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version-file: backend/.python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.31"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Verify and install locked dependencies
        working-directory: backend
        shell: bash
        run: |
          set -euo pipefail
          expected_python="$(tr -d '[:space:]' < .python-version)"
          python_path="$(command -v python)"
          uv lock --check
          uv sync --python "${python_path}" --frozen --group dev
          actual_python="$(.venv/bin/python -c 'import platform; print(platform.python_version())')"
          if [[ "${actual_python}" != "${expected_python}" ]]; then
            echo "::error::Expected Python ${expected_python}, got ${actual_python}"
            exit 1
          fi

      - name: Run tests
        working-directory: backend
        run: .venv/bin/python -m pytest tests/ -q

      - name: Run upgrade benchmark gate
        # Catch migration/startup regressions in PR CI, not only at release time.
        # The 10k-event benchmark takes ~240ms locally, so it is a cheap gate.
        working-directory: backend
        run: .venv/bin/python -m tests.performance.upgrade_benchmark --events 10000 --enforce-gates

      - name: Run Pyright
        shell: bash
        run: |
          python_version="$(tr -d '[:space:]' < backend/.python-version)"
          backend/.venv/bin/pyright --pythonversion "${python_version%.*}" backend/app backend/tests plugins

      - name: Check pre-built Tailwind CSS is up to date
        working-directory: backend
        run: |
          npx -y tailwindcss@3.4.17 -c tailwind.config.js -i tailwind.input.css -o app/static/css/tailwind.css --minify
          if ! git diff --exit-code app/static/css/tailwind.css; then
            echo "::error file=backend/app/static/css/tailwind.css::tailwind.css is out of date. Rebuild it locally and commit the result:"
            echo "::error::cd backend && npx -y tailwindcss@3.4.17 -c tailwind.config.js -i tailwind.input.css -o app/static/css/tailwind.css --minify"
            exit 1
          fi

      - name: Build production image
        run: docker build --file docker/Dockerfile --tag opensecdash:ci .

      - name: Smoke test production image
        shell: bash
        run: |
          set -euo pipefail
          cleanup() {
            docker rm -f opensecdash-ci-smoke >/dev/null 2>&1 || true
            docker volume rm opensecdash-ci-smoke >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          expected_python="$(tr -d '[:space:]' < backend/.python-version)"
          actual_python="$(docker run --rm --entrypoint python opensecdash:ci \
            -c 'import platform; print(platform.python_version())')"
          if [[ "${actual_python}" != "${expected_python}" ]]; then
            echo "::error::Production image uses Python ${actual_python}, expected ${expected_python}"
            exit 1
          fi
          docker volume create opensecdash-ci-smoke
          docker run --rm --user root --entrypoint sh \
            -v opensecdash-ci-smoke:/data \
            opensecdash:ci \
            -c 'touch /data/root-owned && chown root:root /data/root-owned'
          docker run -d --name opensecdash-ci-smoke \
            --read-only \
            --tmpfs /tmp:size=16m,mode=1777 \
            --security-opt no-new-privileges:true \
            --cap-drop ALL --cap-add CHOWN --cap-add SETGID --cap-add SETUID \
            --pids-limit 256 --memory 1g --cpus 2 \
            -p 127.0.0.1:18765:8000 \
            -v opensecdash-ci-smoke:/data \
            opensecdash:ci
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:18765/ready >/dev/null; then
              break
            fi
            if [[ "${attempt}" == "30" ]]; then
              docker logs opensecdash-ci-smoke
              exit 1
            fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:18765/health >/dev/null
          curl --fail --silent http://127.0.0.1:18765/ready >/dev/null
          curl --fail --silent http://127.0.0.1:18765/static/css/app.css >/dev/null
          docker exec opensecdash-ci-smoke sh -c \
            'test "$(awk "/^Uid:/ {print \$2}" /proc/1/status)" != "0" && test "$(stat -c %U /data/root-owned)" = "opensecdash"'
          docker exec --user opensecdash opensecdash-ci-smoke sh -c \
            'touch /data/write-test && touch /tmp/write-test && ! touch /app/rootfs-write-test 2>/dev/null'
          docker logs opensecdash-ci-smoke 2>&1 | grep -E 'Starting [0-9]+ plugin task groups' >/dev/null
