name: Tests

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/tests.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/tests.yml"

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e . pytest pyright

      - name: Run tests
        working-directory: backend
        run: .venv/bin/pytest -q

      - name: Run Pyright
        run: backend/.venv/bin/pyright backend/app backend/tests plugins

      - name: Check pre-built Tailwind CSS is up to date
        working-directory: backend
        run: |
          npx -y tailwindcss@3.4.17 -c tailwind.config.js -i tailwind.input.css -o app/static/css/tailwind.css --minify
          if ! git diff --exit-code app/static/css/tailwind.css; then
            echo "::error file=backend/app/static/css/tailwind.css::tailwind.css is out of date. Rebuild it locally and commit the result:"
            echo "::error::cd backend && npx -y tailwindcss@3.4.17 -c tailwind.config.js -i tailwind.input.css -o app/static/css/tailwind.css --minify"
            exit 1
          fi
