name: Tests

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/tests.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/tests.yml"

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest pyright

      - name: Run tests
        working-directory: backend
        run: pytest -q

      - name: Run Pyright
        run: pyright backend/app backend/tests plugins
