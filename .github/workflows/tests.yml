name: Tests

# No `paths:` filter on purpose: "Backend tests" is a required status check,
# and a workflow that never triggers leaves the check in "Expected" forever,
# blocking the merge. Instead the workflow always runs, a cheap first job
# detects whether anything test-relevant changed, and the heavy job is
# skipped otherwise - skipped jobs satisfy required checks.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Check for test-relevant changes
        id: filter
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" != "pull_request" && ( -z "${BASE_SHA}" || "${BASE_SHA}" == "0000000000000000000000000000000000000000" ) ]]; then
            echo "No usable base commit (new branch/force push) - running tests to be safe."
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            # Three-dot diff = changes on the PR side only, even when main moved on.
            changed="$(git diff --name-only "${BASE_SHA}...HEAD")"
          else
            changed="$(git diff --name-only "${BASE_SHA}..${GITHUB_SHA}")"
          fi
          echo "Changed files:"
          echo "${changed}"
          # Markdown-only changes (READMEs, docs) don't need the test suite;
          # anything else under backend/, plugins/, or the workflows does.
          if echo "${changed}" | grep -vE '\.md$' | grep -qE '^(backend/|plugins/|\.github/workflows/)'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "Only documentation/unrelated files changed - skipping tests."
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.code == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.23"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Verify and install locked dependencies
        working-directory: backend
        run: |
          uv lock --check
          uv sync --frozen --group dev

      - name: Run tests
        working-directory: backend
        run: .venv/bin/python -m pytest tests/ -q

      - name: Run Pyright
        run: backend/.venv/bin/pyright --pythonversion 3.13 backend/app backend/tests plugins

      - name: Check pre-built Tailwind CSS is up to date
        working-directory: backend
        run: |
          npx -y tailwindcss@3.4.17 -c tailwind.config.js -i tailwind.input.css -o app/static/css/tailwind.css --minify
          if ! git diff --exit-code app/static/css/tailwind.css; then
            echo "::error file=backend/app/static/css/tailwind.css::tailwind.css is out of date. Rebuild it locally and commit the result:"
            echo "::error::cd backend && npx -y tailwindcss@3.4.17 -c tailwind.config.js -i tailwind.input.css -o app/static/css/tailwind.css --minify"
            exit 1
          fi
