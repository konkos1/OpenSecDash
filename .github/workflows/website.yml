name: Website

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/website.yml"
  pull_request:
    paths:
      - "website/**"
      - ".github/workflows/website.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci --no-audit

      - name: Build website
        working-directory: website
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: npm run docs:build

      - name: Deploy to Cloudflare Workers
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: website
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx --yes wrangler@latest deploy

      - name: Wait for Cloudflare deployment propagation
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: sleep 60

      - name: Submit URLs to IndexNow
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        working-directory: website
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          INDEXNOW_HOST: opensecdash.app
          # api.indexnow.org (the spec's generic endpoint) instead of Bing's
          # direct one: bing.com/indexnow is known to answer 403
          # "UserForbiddedToAccessSite" for submissions the generic endpoint
          # accepts - and the generic endpoint forwards to Bing and every
          # other IndexNow partner anyway.
          INDEXNOW_ENDPOINT: https://api.indexnow.org/indexnow
        run: npm run indexnow:submit
