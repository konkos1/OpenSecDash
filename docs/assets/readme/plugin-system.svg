<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">OpenSecDash plugin system diagram</title>
  <desc id="desc">Diagram of plugin capabilities for datasources, enrichment, actions, exports, pages and widgets.</desc>
  <rect width="1200" height="520" fill="#020617"/>
  <text x="60" y="62" font-family="Inter,Arial,sans-serif" font-size="32" font-weight="800" fill="#f8fafc">Plugin-first, homelab-friendly</text>
  <text x="60" y="100" font-family="Inter,Arial,sans-serif" font-size="18" fill="#94a3b8">Add new integrations without turning the core app into spaghetti.</text>
  <g font-family="Inter,Arial,sans-serif">
    <rect x="430" y="180" width="340" height="150" rx="26" fill="#0f172a" stroke="#60a5fa" stroke-width="2"/>
    <text x="492" y="246" font-size="28" font-weight="800" fill="#f8fafc">OpenSecDash Core</text>
    <text x="488" y="286" font-size="17" fill="#94a3b8">settings · diagnostics · UI · storage</text>
    <g font-size="18" font-weight="700">
      <rect x="70" y="160" width="220" height="70" rx="16" fill="#0f172a" stroke="#334155"/><text x="105" y="203" fill="#f8fafc">Datasource</text>
      <rect x="70" y="280" width="220" height="70" rx="16" fill="#0f172a" stroke="#334155"/><text x="105" y="323" fill="#f8fafc">Enrichment</text>
      <rect x="910" y="160" width="220" height="70" rx="16" fill="#0f172a" stroke="#334155"/><text x="954" y="203" fill="#f8fafc">Action</text>
      <rect x="910" y="280" width="220" height="70" rx="16" fill="#0f172a" stroke="#334155"/><text x="954" y="323" fill="#f8fafc">Export</text>
      <rect x="380" y="400" width="200" height="70" rx="16" fill="#0f172a" stroke="#334155"/><text x="432" y="443" fill="#f8fafc">Page</text>
      <rect x="620" y="400" width="200" height="70" rx="16" fill="#0f172a" stroke="#334155"/><text x="666" y="443" fill="#f8fafc">Widget</text>
    </g>
    <g stroke="#60a5fa" stroke-width="4" stroke-linecap="round" opacity="0.9">
      <path d="M290 195h128"/><path d="M290 315h128"/><path d="M770 195h128"/><path d="M770 315h128"/><path d="M510 330v58"/><path d="M690 330v58"/>
    </g>
    <text x="78" y="250" font-size="15" fill="#94a3b8">Traefik today · Nginx/Caddy tomorrow</text>
    <text x="916" y="250" font-size="15" fill="#94a3b8">CrowdSec ban/unban</text>
    <text x="916" y="370" font-size="15" fill="#94a3b8">MQTT/Home Assistant</text>
  </g>
</svg>
