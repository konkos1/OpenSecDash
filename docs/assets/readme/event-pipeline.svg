<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">OpenSecDash event pipeline diagram</title>
  <desc id="desc">Diagram showing plugins collecting data, enrichment, storage, correlation, UI, and actions.</desc>
  <rect width="1200" height="420" rx="0" fill="#020617"/>
  <text x="60" y="64" font-family="Inter,Arial,sans-serif" font-size="30" font-weight="800" fill="#f8fafc">From noisy homelab signals to useful security context</text>
  <g font-family="Inter,Arial,sans-serif">
    <g transform="translate(60 120)"><rect width="170" height="96" rx="18" fill="#0f172a" stroke="#334155"/><text x="24" y="38" font-size="18" font-weight="700" fill="#f8fafc">Datasources</text><text x="24" y="68" font-size="15" fill="#94a3b8">Traefik · CrowdSec</text></g>
    <path d="M245 168h70" stroke="#60a5fa" stroke-width="5" stroke-linecap="round"/><path d="M303 154l18 14-18 14" fill="none" stroke="#60a5fa" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(330 120)"><rect width="170" height="96" rx="18" fill="#0f172a" stroke="#334155"/><text x="24" y="38" font-size="18" font-weight="700" fill="#f8fafc">Enrichment</text><text x="24" y="68" font-size="15" fill="#94a3b8">GeoIP · ASN · ISP</text></g>
    <path d="M515 168h70" stroke="#60a5fa" stroke-width="5" stroke-linecap="round"/><path d="M573 154l18 14-18 14" fill="none" stroke="#60a5fa" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(600 120)"><rect width="170" height="96" rx="18" fill="#0f172a" stroke="#334155"/><text x="24" y="38" font-size="18" font-weight="700" fill="#f8fafc">Event Store</text><text x="24" y="68" font-size="15" fill="#94a3b8">filters · rollups</text></g>
    <path d="M785 168h70" stroke="#60a5fa" stroke-width="5" stroke-linecap="round"/><path d="M843 154l18 14-18 14" fill="none" stroke="#60a5fa" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(870 120)"><rect width="250" height="96" rx="18" fill="#0f172a" stroke="#334155"/><text x="24" y="38" font-size="18" font-weight="700" fill="#f8fafc">OpenSecDash UI</text><text x="24" y="68" font-size="15" fill="#94a3b8">dashboard · events · IP explorer</text></g>
    <g transform="translate(240 280)"><rect width="720" height="64" rx="18" fill="#0f172a" stroke="#334155"/><text x="28" y="40" font-size="18" fill="#e2e8f0">Correlation creates insights; controlled actions go through the Action Framework, not shell scripts.</text></g>
  </g>
</svg>
