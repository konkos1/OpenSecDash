services:
  opensecdash:
    image: konkos1/opensecdash:latest
    container_name: opensecdash
    ports:
      - "8765:8000"
    # Optional: required for the CrowdSec plugin to reach CrowdSec's Local
    # API on 127.0.0.1 when CrowdSec runs on this same host. Drops the ports
    # mapping above; the app is then reachable on host port 8000.
    # network_mode: "host"
    volumes:
      - opensecdash-data:/data
      # Optional: mount host log files or inventory files read-only for plugins.
      # - /var/log/access.log:/logs/access.log:ro
      # - /var/log/geoblock.log:/logs/geoblock.log:ro
      # - /var/log/crowdsec.log:/logs/crowdsec.log:ro
      # - ./assets/assets.json:/assets/assets.json:ro
    # Optional: completely disable individual plugins. A disabled plugin is
    # hidden everywhere (settings, diagnostics, navigation) and runs no
    # background tasks. Saved plugin settings are kept and come back when the
    # variable is removed. Variable name: OSD_PLUGIN_<PLUGIN>_DISABLED (plugin
    # dir name or id, uppercased, "-" -> "_"), value 1/true/yes/on.
    # environment:
    #   # Optional: restrict which reverse proxies may set X-Forwarded-* headers
    #   # (default: loopback + private ranges; empty value disables).
    #   - OSD_TRUSTED_PROXIES=192.168.1.10
    #   # Emergency switch: disables the optional internal sign-in.
    #   - OSD_AUTH_DISABLED=true
    #   - OSD_PLUGIN_MQTT_DISABLED=true
    #   - OSD_PLUGIN_PROXMOX_ASSETS_DISABLED=true
    #   - OSD_PLUGIN_CROWDSEC_DISABLED=true
    # Optional but recommended: keep Docker's json-file logs bounded.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

volumes:
  opensecdash-data:
