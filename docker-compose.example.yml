services:
  opensecdash:
    image: konkos1/opensecdash:latest
    # During local development, you can replace the image with:
    # build: .
    container_name: opensecdash
    ports:
      - "8765:8000"
    environment:
      DATABASE_URL: sqlite:////data/opensecdash.db
      AUTO_MIGRATE: "true"
      # Docker installs should log to stdout/stderr and let Docker rotate logs.
      LOG_FILE_ENABLED: "false"
      # Optional: change the internal bind address/port if you really need to.
      # OSD_HOST: 0.0.0.0
      # OSD_PORT: "8000"
    volumes:
      - opensecdash-data:/data
      # Optional: mount host log files or inventory files read-only for plugins.
      # - /var/log/access.log:/logs/access.log:ro
      # - /var/log/geoblock.log:/logs/geoblock.log:ro
      # - /var/log/crowdsec.log:/logs/crowdsec.log:ro
      # - ./apps-installed.json:/data/apps-installed.json:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

volumes:
  opensecdash-data:
