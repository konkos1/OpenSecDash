services:
  opensecdash:
    image: konkos1/opensecdash:latest
    container_name: opensecdash
    ports:
      - "8765:8000"
    # Optional: required for the CrowdSec plugin to reach CrowdSec's Local
    # API on 127.0.0.1 when CrowdSec runs on this same host. Drops the ports
    # mapping above; the app is then reachable on host port 8000.
    # network_mode: "host"
    volumes:
      - opensecdash-data:/data
      # Optional: mount host log files or inventory files read-only for plugins.
      # - /var/log/access.log:/logs/access.log:ro
      # - /var/log/geoblock.log:/logs/geoblock.log:ro
      # - /var/log/crowdsec.log:/logs/crowdsec.log:ro
      # - ./assets/assets.json:/assets/assets.json:ro
    # Optional but recommended: keep Docker's json-file logs bounded.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

volumes:
  opensecdash-data:
