services:
  opensecdash:
    image: konkos1/opensecdash:latest
    # During local development, you can replace the image with:
    # build: .
    container_name: opensecdash
    ports:
      - "8765:8000"
    # Optional: sensitive settings (passwords, API tokens) are encrypted at
    # rest automatically. By default the key is auto-generated inside /data;
    # set it here instead to keep the key out of the data volume and its
    # backups. Generate once with:
    #   python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
    # environment:
    #   OSD_SECRET_KEY: "<your-generated-key>"
    # Optional: required for the CrowdSec plugin's cscli actions to reach
    # CrowdSec's Local API on 127.0.0.1 when CrowdSec runs on this same host.
    # Drops the ports mapping above; the app is then reachable on host port 8000.
    # network_mode: "host"
    volumes:
      - opensecdash-data:/data
      # Optional: mount host log files or inventory files read-only for plugins.
      # - /var/log/access.log:/logs/access.log:ro
      # - /var/log/geoblock.log:/logs/geoblock.log:ro
      # - /var/log/crowdsec.log:/logs/crowdsec.log:ro
      # - ./assets/assets.json:/assets/assets.json:ro
      # Optional: cscli binary + CrowdSec config for the CrowdSec plugin's
      # ban/unban actions and decision sync (needs network_mode: host above).
      # - /usr/bin/cscli:/usr/local/bin/cscli:ro
      # - /etc/crowdsec:/etc/crowdsec:ro
    # Optional but recommended: keep Docker's json-file logs bounded.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

volumes:
  opensecdash-data:
